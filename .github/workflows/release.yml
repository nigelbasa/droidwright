name: Release

# Publishes to npm when a version tag (e.g. v0.1.0) is pushed.
# Uses npm trusted publishing (OIDC) — no NPM_TOKEN secret needed.
# Configure at https://www.npmjs.com/package/droidwright/access → "Configure Trusted Publishing"
# and add the GitHub Actions environment below.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for OIDC-based npm provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm  # must match the environment configured in npm trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      # `prepare` rebuilds build/ before publishing.
      - name: Publish with provenance
        run: npm publish --provenance --access public
